<h2>Todo attuali</h2>
<ul role="list" aria-live="polite" aria-label="Lista dei todo">
  <for each="todo in todos">
    <li
      is="mt-todoitem"
      data-id="{{todo.id}}"
      data-text="{{todo.title}}"
      data-completed="{{todo.completed}}"
      data-created-at="{{todo.createdAtString}}"
      data-updated-at="{{todo.updatedAtString}}"></li>
  </for>
</ul>
<p role="status" aria-live="polite">Nessun todo. Aggiungine uno!</p>

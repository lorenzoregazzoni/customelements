<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>customElements</title>
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <main>
      <section is="mt-app">
        
      </section>
      <h1>Lista Todo</h1>

      <section aria-labelledby="todo-form-heading">
        <h2 id="todo-form-heading" class="sr-only">Aggiungi nuovo todo</h2>
        <form id="todo-form" role="search">
          <label for="todo-input">Nuovo todo:</label>
          <input
            type="text"
            id="todo-input"
            placeholder="Scrivi un nuovo todo..."
            required
            aria-required="true" />
          <button type="submit">Aggiungi</button>
        </form>
      </section>

      <section aria-labelledby="todo-list-heading">
        <h2 id="todo-list-heading">Todo attuali</h2>
        <ul id="todo-list" role="list" aria-live="polite" aria-label="Lista dei todo">
          <!-- I todo verranno inseriti qui -->
        </ul>
        <p id="todo-empty" role="status" aria-live="polite">Nessun todo. Aggiungine uno!</p>
      </section>
    </main>
    <script type="module" src="./scripts/index.ts"></script>
  </body>
</html>
